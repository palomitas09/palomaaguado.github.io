<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kukicha — Paloma Aguado</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #1a1a1a; 
        }

        nav { padding: 40px 5%; }
        nav a { text-decoration: none; color: #999; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        
        .hero { width: 100%; margin-bottom: 60px; }
        .hero img { width: 100%; height: auto; display: block; }

        header { margin-bottom: 80px; }
        h1 { font-size: 45px; font-weight: 200; margin: 0 0 10px 0; }
        .meta { color: #999; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; display: block; margin-bottom: 30px; }
        .info { max-width: 650px; line-height: 1.8; font-size: 16px; color: #444; }

        /* --- NUEVA GALERÍA EQUILIBRADA --- */
        .gallery { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Dos columnas */
            gap: 20px;
            padding-bottom: 100px;
        }

        .gallery img { 
            width: 100%; 
            height: 500px; /* Altura estándar para que todo encaje */
            object-fit: cover; 
            display: block;
        }

        /* AJUSTE ESPECIAL PARA WEB Y RRSS */
        /* Hacemos que la web sea un poco más ancha o destaque sin romper el ritmo */
        .gallery img.special { 
            object-fit: contain; /* Para que no se corte el diseño de la web */
            background-color: #f9f9f9; /* Un fondo sutil por si la imagen es más estrecha */
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            h1 { font-size: 30px; }
            .gallery img { height: auto; }
        }
    </style>
</head>
<body>

    <nav><a href="index.html">← Volver</a></nav>

    <div class="container">
        <section class="hero">
            <img src="proyectos/packaging.png" alt="Kukicha">
        </section>

        <header>
            <span class="meta">Identidad de Marca / 2025</span>
            <h1>Kukicha</h1>
            <div class="info">
                <p>Kukicha es una marca ficticia de té japonés inspirada en la tradición y el minimalismo. El diseño se centra en la pureza y la sostenibilidad.</p>
            </div>
        </header>

        <section class="gallery">
            <img src="proyectos/merchan.png" alt="Merchan">
            <img src="proyectos/papeleria.png" alt="Papelería">
            
            <img src="proyectos/web.png" alt="Web" class="special">
            <img src="proyectos/rrss.png" alt="RRSS" class="special">
        </section>
    </div>

    <footer style="text-align: center; padding: 40px 0; color: #ddd; font-size: 10px; letter-spacing: 2px;">
        © 2026 PALOMA AGUADO
    </footer>

</body>
</html>
