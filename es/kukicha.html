<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kukicha — Paloma Aguado</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: white; font-family: 'Helvetica', Arial, sans-serif; color: #1a1a1a; }
        
        nav { padding: 40px 5%; }
        nav a { text-decoration: none; color: #999; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 5%; }
        
        /* Imagen principal */
        .hero img { width: 100%; height: auto; display: block; margin-bottom: 50px; }

        /* Textos */
        header { margin-bottom: 70px; }
        h1 { font-size: 48px; font-weight: 300; margin: 0 0 10px 0; }
        .meta { color: #999; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; display: block; margin-bottom: 30px; }
        .info { max-width: 600px; line-height: 1.8; font-size: 16px; color: #444; }

        /* Galería - AQUÍ ESTÁ EL ARREGLO */
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding-bottom: 100px; 
        }
        .gallery img { 
            width: calc(50% - 10px); /* Dos columnas exactas */
            height: 500px; 
            object-fit: cover; /* Esto evita que se estiren */
            display: block;
        }

        @media (max-width: 768px) {
            .gallery img { width: 100%; height: auto; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <nav><a href="index.html">← Volver</a></nav>

    <div class="container">
        <section class="hero">
            <img src="proyectos/packaging.png" alt="Kukicha">
        </section>

        <header>
            <span class="meta">Identidad de Marca / 2025</span>
            <h1>Kukicha</h1>
            <div class="info">
                <p>Kukicha es una marca ficticia de té japonés desarrollada desde cero como proyecto de identidad corporativa. El objetivo fue crear una marca visual minimalista, elegante y sostenible.</p>
            </div>
        </header>

        <section class="gallery">
            <img src="proyectos/merchan.png" alt="Merchan">
            <img src="proyectos/papeleria.png" alt="Papeleria">
            <img src="proyectos/web.png" alt="Web">
            <img src="proyectos/rrss.png" alt="RRSS">
        </section>
    </div>

    <footer style="text-align: center; padding-bottom: 50px; color: #ccc; font-size: 10px; letter-spacing: 2px;">
        © 2026 PALOMA AGUADO
    </footer>

</body>
</html>
