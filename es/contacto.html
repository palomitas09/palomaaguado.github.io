<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Paloma Aguado</title>
    <style>
        /* --- ESTILOS GENERALES (VIBRA PALOMITAS) --- */
        body { 
            margin: 0; padding: 0; 
            background-color: #F9F8F5; /* El crema orgánico que une todo */
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        header { 
            padding: 40px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo a { 
            text-decoration: none; 
            color: inherit; 
            font-weight: 200; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
        }

        nav a { 
            text-decoration: none; 
            color: #888; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #e63946; }

        /* --- CONTENEDOR DE CONTACTO --- */
        .contact-container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px 20px 100px 20px; 
            text-align: center;
        }

        h1 { 
            font-size: 4.5rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin-bottom: 10px; 
            line-height: 0.9;
        }

        .intro-text { 
            font-size: 1.2rem; 
            color: #555; 
            margin-bottom: 50px; 
            max-width: 500px; 
            margin-left: auto; 
            margin-right: auto;
            line-height: 1.6;
        }

        /* --- FORMULARIO DISEÑADO --- */
        .contact-form { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            background: white; 
            padding: 40px; 
            border: 2px solid #1a1a1a; 
            box-shadow: 15px 15px 0px #ffb703; /* Tu sombra amarilla "pop" */
        }

        input, textarea { 
            width: 100%; 
            padding: 15px; 
            border: 1px solid #ddd; 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input:focus, textarea:focus { 
            border-color: #e63946; /* Rojo coral al escribir */
        }

        textarea { grid-column: span 2; resize: none; }

        button { 
            grid-column: span 2; 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s;
        }

        button:hover { 
            background: #e63946; 
            transform: translateY(-3px);
        }

        /* --- SOCIAL LINKS --- */
        .social-links { 
            margin-top: 60px; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        .social-links a { 
            text-decoration: none; 
            color: #1a1a1a; 
            font-weight: bold; 
            margin: 0 10px; 
            position: relative;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            width: 100%; height: 2px;
            bottom: -4px; left: 0;
            background-color: #ffb703;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .social-links a:hover::after { transform: scaleX(1); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .contact-form { 
                grid-template-columns: 1fr; 
                padding: 20px;
                box-shadow: 8px 8px 0px #ffb703;
            }
            textarea { grid-column: span 1; }
            button { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">PALOMA AGUADO</a></div>
        <nav>
            <a href="index.html">Proyectos</a>
            <a href="/palomaaguado.github.io/en/contact.html" style="margin-left: 20px; color: #e63946; font-weight: bold;">EN</a>
        </nav>
    </header>

    <main class="contact-container">
        <h1>¿Hablamos?</h1>
        <p class="intro-text">¿Tienes algún proyecto en mente o simplemente quieres saludar? Estás a un mensaje de distancia.</p>
        
        <form action="https://formspree.io/f/tuyo" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Tu nombre" required>
            <input type="email" name="_replyto" placeholder="Tu email" required>
            <textarea name="message" placeholder="¿En qué puedo ayudarte?" rows="5" required></textarea>
            <button type="submit">Enviar mensaje</button>
        </form>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/paloma-aguado-l%C3%B3pez/" target="_blank">LinkedIn</a>
            <a href="https://www.instagram.com/palomitas09/" target="_blank">Instagram</a>
            <a href="mailto:paloaglo@gmail.com">Email</a>
        </div>
    </main>

</body>
</html>
