<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart TV Experience | Paloma Aguado</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --disney-blue: #0063e5; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* --- NAVEGACIÓN --- */
        .screen { position: absolute; top:0; left:0; width: 100%; height: 100%; display: none; }
        .slide { position: absolute; top:0; left:0; width: 100vw; height: 100vh; display: none; background-size: contain; background-repeat: no-repeat; background-position: center; }

        /* --- DISNEY GRID --- */
        #slide-disney { background-image: url('../es/proyectos/tfm-disney1.jpg'); }
        
        .disney-grid {
            position: absolute;
            top: 25%;
            left: 10%;
            width: 80%;
            height: 60%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            z-index: 100;
        }

        .video-item {
            background: #000;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
        }

        .video-item:hover {
            transform: scale(1.05);
            border-color: var(--disney-blue);
            box-shadow: 0 0 15px rgba(0, 99, 229, 0.5);
        }

        .video-item iframe { width: 100%; height: 100%; border: none; }

        .back-arrow { position: fixed; top: 30px; left: 40px; width: 45px; height: 45px; background: rgba(0,0,0,0.5); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

    <div id="btn-back" class="back-arrow" onclick="window.history.back()">←</div>

    <div id="slide-disney" class="slide" style="display: block;">
        <div class="disney-grid">
            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/dgulLqAKjvk?rel=0" allowfullscreen></iframe>
            </div>
            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/BC6lkiBx01c?rel=0" allowfullscreen></iframe>
            </div>
            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/5U_OBfXYs-4?rel=0" allowfullscreen></iframe>
            </div>
            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/KAiFRHNWuWY?rel=0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

</body>
</html>
